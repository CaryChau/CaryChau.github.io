---
layout: default
---

<article class="project-page">

    <h1>{{ page.title }}</h1>

    <p>
        {{ page.description }}
    </p>

    <p>
        <a href="{{ page.github }}">
            GitHub Repository
        </a>
    </p>

    <h2>Core Technical Challenges</h2>

    <ul>
        {% for problem in page.core_problems %}
        <li>{{ problem }}</li>
        {% endfor %}
    </ul>

    {{ content }}

</article>
