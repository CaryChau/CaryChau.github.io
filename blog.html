---
layout: portfolio
title: Blog
---

<section class="blog-page">

    <h1 class="blog-title">
        Blog
    </h1>

    {% for post in site.posts %}

    <article class="blog-card">

        <h2>
            <a href="{{ post.url }}">
                {{ post.title }}
            </a>
        </h2>

        <div class="post-date">
            {{ post.date | date: "%B %d, %Y" }}
        </div>

        <p>
            {{ post.excerpt | strip_html | truncate: 250 }}
        </p>

        <a href="{{ post.url }}" class="read-more">
            Read More →
        </a>

    </article>

    {% endfor %}

</section>
